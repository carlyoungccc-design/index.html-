<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Carl Studio · 内容后台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --g:       #1A7A3C;
  --g2:      #2C9E56;
  --g3:      #7ED4A0;
  --gd:      #0F4A24;
  --gp:      #EDF7F1;
  --gp2:     #D4EEE0;
  --gold:    #C8973A;
  --goldt:   #FFF3DC;
  --ink:     #111111;
  --ink2:    #444444;
  --ink3:    #888888;
  --ink4:    #BBBBBB;
  --bg:      #F5F7F5;
  --card:    #FFFFFF;
  --border:  #E0E8E3;
  --border2: #C8DDD0;
  --r:       14px;
  --r2:      10px;
  --sh:      0 2px 16px rgba(26,122,60,.07);
  --sh2:     0 4px 24px rgba(26,122,60,.13);
  --red:     #E53935;
  --redp:    #FFEBEE;
  --blue:    #1565C0;
  --bluep:   #E3F2FD;
  --amber:   #E65100;
  --amberp:  #FFF3E0;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:90px;
  font-size:14px;
}

/* ── NAV ── */
nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  border-top:1px solid var(--border);
  display:flex;
  z-index:200;
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 12px;
  cursor:pointer;
  border:none;background:none;
  color:var(--ink3);
  font-family:'Noto Sans SC',sans-serif;
  font-size:10px;gap:4px;
  transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.nav-item.active{color:var(--g);}
.nav-icon{font-size:22px;line-height:1;}

/* ── PAGES ── */
.page{display:none;padding:0 0 12px;}
.page.active{display:block;}

/* ── PAGE HEADER ── */
.page-header{
  background:var(--g);
  padding:52px 20px 20px;
  color:#fff;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(26,122,60,.25);
}
.page-header h1{
  font-family:'Noto Serif SC',serif;
  font-size:20px;font-weight:900;
  letter-spacing:.03em;
}
.page-header p{
  font-size:11px;color:rgba(255,255,255,.6);
  margin-top:3px;
}

/* ── SECTION ── */
.section{padding:16px 16px 0;}
.section-title{
  font-size:11px;font-weight:600;
  color:var(--ink3);letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.section-title::before{
  content:'';width:3px;height:14px;
  background:var(--g);border-radius:2px;
}

/* ── CARDS ── */
.card{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--sh);
  overflow:hidden;
}
.card+.card{margin-top:10px;}

/* ── PROGRESS BAR ── */
.prog-wrap{margin-top:12px;}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-label{font-size:12px;color:rgba(255,255,255,.8);}
.prog-num{font-family:'DM Mono',monospace;font-size:12px;color:#7EEAAA;}
.prog-bar{background:rgba(255,255,255,.2);border-radius:99px;height:5px;overflow:hidden;}
.prog-fill{height:100%;background:#7EEAAA;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* ══════════════════════════════════════════════════════
   PAGE 1: SHOTS CHECKLIST
══════════════════════════════════════════════════════ */
.today-banner{
  margin:12px 16px 0;
  background:linear-gradient(135deg,var(--g),var(--g2));
  border-radius:var(--r);padding:12px 14px;
  color:#fff;display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--sh2);
}
.today-banner-left{flex:1;}
.today-banner-title{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;}
.today-banner-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px;}
.today-banner-count{
  font-family:'DM Mono',monospace;font-size:22px;font-weight:700;
  background:rgba(255,255,255,.2);border-radius:8px;
  padding:6px 12px;text-align:center;
}
.today-banner-count small{display:block;font-size:9px;font-weight:400;opacity:.8;}

.filter-scroll{
  display:flex;gap:7px;padding:12px 16px;
  overflow-x:auto;scrollbar-width:none;
  background:var(--card);
  border-bottom:1px solid var(--border);
  position:sticky;top:110px;z-index:90;
  box-shadow:var(--sh);
}
.filter-scroll::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:5px 12px;border-radius:99px;
  border:1.5px solid var(--border);background:var(--card);
  color:var(--ink2);font-size:11px;
  font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;white-space:nowrap;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.chip.active{background:var(--g);border-color:var(--g);color:#fff;font-weight:500;}

.loc-group{margin:12px 16px 0;}
.loc-head{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r);
  cursor:pointer;user-select:none;
  transition:all .15s;
  box-shadow:var(--sh);
}
.loc-head.open{border-color:var(--g);background:var(--gp);}
.loc-icon2{
  width:34px;height:34px;border-radius:8px;
  background:var(--g);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.loc-info{flex:1;min-width:0;}
.loc-name{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;}
.loc-sub{font-size:10px;color:var(--ink3);margin-top:1px;}
.loc-badge{
  font-family:'DM Mono',monospace;font-size:10px;
  background:var(--gp);color:var(--g);
  padding:3px 8px;border-radius:99px;
  border:1px solid rgba(26,122,60,.2);
  white-space:nowrap;flex-shrink:0;
}
.loc-arr{font-size:11px;color:var(--ink4);transition:transform .2s;flex-shrink:0;}
.loc-head.open .loc-arr{transform:rotate(90deg);}

.shots-list{display:none;flex-direction:column;gap:8px;padding:8px 0;}
.shots-list.open{display:flex;}

.shot-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r2);overflow:hidden;
  transition:border-color .15s;box-shadow:var(--sh);
}
.shot-card.done{border-color:var(--g2);background:var(--gp);}
.shot-head{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px;cursor:pointer;
}
.cb{
  width:20px;height:20px;border-radius:5px;
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
  transition:all .15s;background:var(--card);
  cursor:pointer;
}
.shot-card.done .cb{background:var(--g);border-color:var(--g);}
.cb svg{opacity:0;transition:opacity .15s;}
.shot-card.done .cb svg{opacity:1;}
.shot-body{flex:1;min-width:0;}
.tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
.stag{
  font-size:9px;padding:2px 7px;border-radius:99px;
  font-weight:500;white-space:nowrap;
}
.t-early{background:#E8F4FD;color:#1A5C8A;}
.t-noon {background:#FFF3E0;color:#9A4400;}
.t-aft  {background:#EDE7F6;color:#4A2A7A;}
.t-eve  {background:#FCE4EC;color:#8A1A3A;}
.t-any  {background:#F3F3F3;color:#555;}
.t-launch{background:#FFF8E1;color:#8A5C00;border:1px solid #F0C840;}
.shot-scene{font-size:13px;font-weight:500;line-height:1.4;}
.shot-card.done .shot-scene{color:var(--g);text-decoration:line-through;text-decoration-color:var(--g3);}
.dev-row{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.dtag{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;}
.d-dev{background:#EEF2FF;color:#3A4A9A;}
.d-ori{background:#FFF0F8;color:#8A2A6A;}
.expand-toggle{
  font-size:10px;color:var(--g);background:none;border:none;
  cursor:pointer;margin-top:7px;font-family:'Noto Sans SC',sans-serif;
  display:flex;align-items:center;gap:3px;padding:0;
}
.ea{display:inline-block;transition:transform .2s;}
.expand-toggle.open .ea{transform:rotate(90deg);}

.shot-detail{display:none;border-top:1px solid var(--border);}
.shot-detail.open{display:block;}
.det-sec{padding:12px 14px;border-bottom:1px solid var(--border);}
.det-sec:last-child{border-bottom:none;}
.det-label{
  font-size:9px;font-weight:600;color:var(--ink3);
  letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:7px;display:flex;align-items:center;gap:5px;
}
.det-label::before{content:'';width:2px;height:10px;background:var(--g);border-radius:1px;}
.det-txt{font-size:12px;line-height:1.75;color:var(--ink2);white-space:pre-wrap;}
.audio-box{
  background:var(--gp);border:1px solid rgba(26,122,60,.18);
  border-radius:8px;padding:10px 12px;
  font-size:12px;line-height:1.75;
  font-family:'Noto Serif SC',serif;
  white-space:pre-wrap;color:var(--gd);
}
.tip-box{
  background:#FFFBEA;border:1px solid #F0D060;
  border-radius:8px;padding:8px 11px;
  font-size:11px;color:#7A5500;line-height:1.6;
  margin-top:7px;white-space:pre-wrap;
}

/* ══════════════════════════════════════════════════════
   PAGE 2: SCRIPTS LIBRARY + IMPORT
══════════════════════════════════════════════════════ */

/* Import module */
.import-wrap{
  margin:14px 16px 0;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;
}
.import-header{
  padding:12px 14px;background:var(--gp);
  border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:3px;
}
.import-title{font-size:13px;font-weight:600;color:var(--g);}
.import-hint{font-size:10px;color:var(--ink3);}
.import-body{padding:12px 14px;}
.import-file-area{
  border:2px dashed var(--border2);border-radius:10px;
  padding:20px;text-align:center;cursor:pointer;
  transition:all .15s;background:var(--bg);
}
.import-file-area:active{border-color:var(--g);background:var(--gp);}
.import-file-icon{font-size:28px;margin-bottom:6px;}
.import-file-text{font-size:12px;color:var(--ink3);}
.import-preview{padding:0 14px 14px;}
.import-preview:empty{display:none;}

.preview-card{
  background:var(--gp);border:1.5px solid var(--g);
  border-radius:10px;padding:12px 14px;
}
.preview-title{font-size:14px;font-weight:600;color:var(--g);margin-bottom:4px;}
.preview-meta{font-size:11px;color:var(--ink3);margin-bottom:10px;}
.preview-shots-count{
  font-size:11px;color:var(--ink2);
  background:var(--card);border-radius:6px;
  padding:6px 10px;margin-bottom:10px;
}
.preview-actions{display:flex;gap:8px;}
.btn-import-confirm{
  flex:2;padding:10px;background:var(--g);color:#fff;
  border:none;border-radius:8px;
  font-family:'Noto Sans SC',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;
}
.btn-import-cancel{
  flex:1;padding:10px;background:none;color:var(--ink2);
  border:1.5px solid var(--border);border-radius:8px;
  font-family:'Noto Sans SC',sans-serif;
  font-size:13px;cursor:pointer;
}

/* Scripts library */
.scripts-library{margin:12px 16px 0;}

.script-video-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r);box-shadow:var(--sh);
  overflow:hidden;margin-bottom:10px;
}
.svc-header{
  padding:14px;cursor:pointer;
  display:flex;align-items:flex-start;gap:10px;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.svc-header:active{background:var(--gp);}
.svc-header.open{background:var(--gp);border-bottom:1px solid var(--border);}
.svc-num{
  font-family:'DM Mono',monospace;font-size:10px;
  background:var(--g);color:#fff;
  padding:2px 7px;border-radius:4px;
  flex-shrink:0;margin-top:2px;
}
.svc-info{flex:1;min-width:0;}
.svc-title{
  font-family:'Noto Serif SC',serif;
  font-size:14px;font-weight:700;
  line-height:1.4;color:var(--ink);
}
.svc-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.svc-tag{
  font-size:9px;padding:2px 7px;border-radius:99px;
  background:var(--gp);color:var(--g);
  border:1px solid rgba(26,122,60,.2);
}
.svc-tag.gold{background:var(--goldt);color:var(--gold);border-color:rgba(200,151,58,.3);}
.svc-arr{font-size:11px;color:var(--ink4);transition:transform .2s;flex-shrink:0;margin-top:4px;}
.svc-header.open .svc-arr{transform:rotate(90deg);}

.svc-del{
  font-size:16px;color:var(--ink4);background:none;border:none;
  cursor:pointer;padding:2px;flex-shrink:0;
  line-height:1;
}

.svc-body{display:none;padding:0 0 4px;}
.svc-body.open{display:block;}

/* Positioning banner */
.svc-positioning{
  margin:12px 14px 0;
  background:var(--goldt);border:1px solid rgba(200,151,58,.3);
  border-radius:8px;padding:9px 12px;
  font-size:11px;color:#7A5000;line-height:1.6;
}

/* XHS copy */
.svc-xhs{
  margin:10px 14px 0;
  background:var(--gp);border:1px solid rgba(26,122,60,.18);
  border-radius:8px;padding:11px 13px;
}
.svc-xhs-label{
  font-size:9px;font-weight:700;color:var(--g);
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:6px;
}
.svc-xhs-text{
  font-size:12px;line-height:1.75;
  font-family:'Noto Serif SC',serif;
  color:var(--gd);white-space:pre-wrap;
}

/* Edit tip */
.svc-edittip{
  margin:10px 14px 0;
  background:#FFFBEA;border:1px solid #F0D060;
  border-radius:8px;padding:9px 12px;
  font-size:11px;color:#7A5500;line-height:1.6;
}
.svc-edittip-label{
  font-size:9px;font-weight:700;color:#9A7000;
  letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:5px;
}

/* Shot items inside script */
.svc-shots{margin:10px 14px 14px;}
.svc-shots-label{
  font-size:9px;font-weight:700;color:var(--ink3);
  letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:8px;display:flex;align-items:center;gap:5px;
}
.svc-shots-label::before{content:'';width:2px;height:10px;background:var(--g);border-radius:1px;}

.svc-shot{
  border:1.5px solid var(--border);border-radius:10px;
  overflow:hidden;margin-bottom:8px;
  background:var(--card);
}
.svc-shot:last-child{margin-bottom:0;}
.svc-shot-head{
  padding:10px 12px;display:flex;
  align-items:flex-start;gap:8px;
  cursor:pointer;background:var(--bg);
  -webkit-tap-highlight-color:transparent;
}
.svc-shot-head:active{background:var(--gp2);}
.svc-shot-head.open{background:var(--gp);border-bottom:1px solid var(--border);}
.sshot-num{
  font-family:'DM Mono',monospace;font-size:9px;
  background:var(--ink2);color:#fff;
  padding:1px 6px;border-radius:3px;flex-shrink:0;margin-top:2px;
}
.svc-shot-head.open .sshot-num{background:var(--g);}
.sshot-info{flex:1;min-width:0;}
.sshot-scene{font-size:12px;font-weight:500;line-height:1.4;color:var(--ink);}
.sshot-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.sshot-loc{
  font-size:9px;padding:1px 6px;border-radius:4px;
  background:#EEF2FF;color:#3A4A9A;
  font-family:'DM Mono',monospace;
}
.sshot-time{
  font-size:9px;padding:1px 6px;border-radius:99px;
  font-weight:500;
}
.sshot-arr{font-size:10px;color:var(--ink4);transition:transform .2s;flex-shrink:0;margin-top:3px;}
.svc-shot-head.open .sshot-arr{transform:rotate(90deg);}

.svc-shot-detail{display:none;padding:10px 12px;}
.svc-shot-detail.open{display:block;}
.ssd-sec{margin-bottom:10px;}
.ssd-sec:last-child{margin-bottom:0;}
.ssd-label{
  font-size:9px;font-weight:600;color:var(--ink3);
  letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:5px;display:flex;align-items:center;gap:4px;
}
.ssd-label::before{content:'';width:2px;height:9px;background:var(--g);border-radius:1px;}
.ssd-txt{font-size:12px;line-height:1.75;color:var(--ink2);white-space:pre-wrap;}
.ssd-audio{
  background:var(--gp);border:1px solid rgba(26,122,60,.18);
  border-radius:7px;padding:9px 11px;
  font-size:12px;line-height:1.75;
  font-family:'Noto Serif SC',serif;
  white-space:pre-wrap;color:var(--gd);
}
.ssd-tip{
  background:#FFFBEA;border:1px solid #F0D060;
  border-radius:7px;padding:7px 10px;
  font-size:11px;color:#7A5500;line-height:1.6;
  margin-top:6px;white-space:pre-wrap;
}

/* ══════════════════════════════════════════════════════
   PAGE 3: CALENDAR
══════════════════════════════════════════════════════ */
.cal-wrap{margin:14px 16px 0;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;}
.cal-btn{
  background:none;border:1.5px solid var(--border);border-radius:8px;
  padding:6px 10px;font-size:13px;cursor:pointer;color:var(--ink2);
  transition:all .15s;
}
.cal-btn:active{background:var(--gp);border-color:var(--g);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{
  text-align:center;font-size:10px;font-weight:600;
  color:var(--ink3);padding:6px 0;letter-spacing:.05em;
}
.cal-day{
  aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:8px;cursor:pointer;
  font-size:13px;position:relative;
  transition:all .15s;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.cal-day:empty{cursor:default;}
.cal-day.today{background:var(--gp);color:var(--g);font-weight:700;}
.cal-day.has-post{font-weight:600;}
.cal-day .dot{
  width:5px;height:5px;border-radius:99px;
  background:var(--g);position:absolute;bottom:4px;
}
.cal-day.selected{background:var(--g);color:#fff;}
.cal-day.selected .dot{background:#fff;}
.cal-day:not(:empty):hover{background:var(--gp);}

.cal-detail{
  margin-top:12px;background:var(--card);
  border:1.5px solid var(--border);border-radius:var(--r);
  box-shadow:var(--sh);overflow:hidden;
}
.cal-detail-header{
  padding:12px 14px;background:var(--gp);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.cal-detail-header h3{
  font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;
}
.btn-add-post{
  background:var(--g);color:#fff;border:none;
  border-radius:99px;padding:6px 14px;
  font-size:11px;font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;
}
.post-list{padding:4px 0;}
.post-item{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;cursor:pointer;
}
.post-item:last-child{border-bottom:none;}
.post-status{
  width:8px;height:8px;border-radius:99px;flex-shrink:0;margin-top:5px;
}
.st-draft{background:var(--ink4);}
.st-ready{background:var(--gold);}
.st-published{background:var(--g);}
.post-info{flex:1;}
.post-title{font-size:13px;font-weight:500;line-height:1.4;}
.post-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.post-tag{
  font-size:9px;padding:1px 6px;border-radius:99px;
  background:var(--gp);color:var(--g);
}

function store(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k,d=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function fmtDate(d){return d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});}

// ── NAV ───────────────────────────────────────────────
function switchPage(btn){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page-'+btn.dataset.page).classList.add('active');
  window.scrollTo(0,0);
}

    {id:"s1",scene:"现代街头 — 高楼车流咖啡馆（引爆点开场）",time:"noon",tName:"🌤 上午 10点前",launch:true,dev:"Pocket 3",ori:"竖屏",visual:"高楼、车流、咖啡馆露台、西装革履的摩洛哥上班族。\n\n拍摄角度：手持跟拍从咖啡馆门口向街道推进，或站在路口拍车流。光线亮，现代感。",audio:"【字幕·白字黑底】大多数人以为摩洛哥是这样的——\n\n【声音】城市街道环境音，无背景音乐。",tip:"早上10点前或下午5点后光线最好。提前踩点，确认哪个街角现代感最强。"},
    {id:"s2",scene:"出镜建立身份 — 「在这里做生意第6年」",time:"noon",tName:"🌤 上午",launch:true,dev:"Pocket 3",ori:"竖屏",visual:"你出镜，站在卡萨布兰卡街头，自然光，背景是真实城市街道。\n\n拍摄角度：手持，与眼睛等高，稍仰角，背景街道清晰。说话状态平静，陈述事实。",audio:"【口述·出镜】但我住的摩洛哥，是这样的。在这里做生意第6年了。\n\n说完硬切，不停顿。",tip:"平静陈述比兴奋表达更有力量。"},

    {id:"s4",scene:"现代建筑群 — 城市体量感",time:"noon",tName:"🌤 上午",launch:true,dev:"Pocket 3",ori:"竖屏",visual:"卡萨布兰卡现代建筑群或宽阔主干道车流。\n\n拍摄角度：固定机位或缓慢横移，展示城市纵深感。不要手持晃动。",audio:"【口述·画外音】这里是卡萨布兰卡，摩洛哥最大的城市。500万人口，全国三分之一的钱在这里流动。\n\n【字幕】500万人口 / 全国经济中心",tip:"找高点或宽阔路口，体现城市规模感。"},
    {id:"s5",scene:"街边早餐摊 — 3块钱在卡萨布兰卡吃什么",time:"early",tName:"☀️ 早晨",launch:false,dev:"Nano",ori:"竖屏",visual:"街边早餐摊，食物、价格、摊主。\n\n拍摄角度：Nano 低角度拍摊位，背景是街道，体现在地感。",audio:"【口述·出镜】在卡萨布兰卡，3块钱人民币，你能吃到什么——",tip:"「生活成本对比」类内容传播极好。"},
    {id:"s6",scene:"旧麦地那窄巷 — 历史街区",time:"noon",tName:"🌤 上午/下午",launch:false,dev:"Pocket 3",ori:"竖屏",visual:"历史最老街区的窄巷、小摊、传统手工。\n\n拍摄角度：手持跟拍走进窄巷，体现历史与现代的对比。",audio:"【字幕】同一座城市，两个时代。\n\n【声音】街巷环境音，人声。",tip:"和现代街头画面并排剪辑，「祛魅」效果最强。"},
    {id:"s7",scene:"夜晚街头 — 卡萨布兰卡夜间灯光",time:"eve",tName:"🌆 夜晚",launch:false,dev:"Pocket 3",ori:"竖屏",visual:"夜晚街头、灯光、人流。手持，不刻意构图，真实夜间街道。",audio:"【声音】夜晚环境音，无台词。\n（b-roll备用。）",tip:"目前所有素材都是白天，夜晚是空白维度，尽早积累。"},
    {id:"panda1",scene:"【熊猫挂件】开场 — 手持挂件出镜，交代动机",time:"any",tName:"📌 随时",launch:false,dev:"Pocket 3",ori:"竖屏",visual:"手持熊猫挂件特写，背景虚化为卡萨布兰卡街头。出镜半身，随意站着，不刻意构图。\n\n拍摄角度：Pocket 3 手持，自拍或请人拍，眼睛高度，背景街道可见即可。",audio:"【画外音，平静】回国采货，顺手带了一批熊猫挂件回来。不值什么钱，但我想做个实验——\n【出镜】把它们随机送给卡萨布兰卡的普通人，看看会发生什么。",tip:"这是全视频的动机交代，语气平静陈述，不要兴奋。说完立刻硬切第一个场景。"},
    {id:"panda3",scene:"【熊猫挂件】场景二 — 停车保安",time:"any",tName:"📌 随时",launch:false,dev:"Nano",ori:"竖屏",visual:"街边停车位。Nano 近景拍保安的手和表情。环境音：街道、车声全部保留。把挂件递过去，观察第一反应，不引导。如果他挂到钥匙上或别在衣服上，停在这个画面3秒不说话。",audio:"【画外音】停车保安，每天见面，从来没送过他东西。\n【字幕（静默画面压字）】他没说谢谢，直接挂上去了。\n我觉得这比说谢谢更好。",tip:"保安反应平淡也没关系，平淡本身就是真实。3秒静默画面不要剪掉。"},
    {id:"panda4",scene:"【熊猫挂件】场景三 — 路边小孩",time:"any",tName:"📌 随时",launch:false,dev:"手机",ori:"竖屏",visual:"街头或市场附近，遇到小孩的自然场景，手机竖屏随手抓拍。环境音全保留，不加配乐。拍小孩拿到挂件的反应、表情、动作。画面停够3–4秒，让画面自己说话。",audio:"【画外音，极简】小孩不用解释熊猫是什么。\n【之后无台词，画面停3–4秒。】",tip:"小孩反应最真，这个场景如果质量好可以放到最后压轴。遇到机会随时拍，不要错过。"},

  {id:"market",icon:"🏪",name:"德比市场",sub:"下午 · 随时可去",shots:[
    {id:"mk1",scene:"主通道行走 — 环境音全开（引爆点·体量）",time:"aft",tName:"🌇 下午",launch:true,dev:"Pocket 3",ori:"竖屏",visual:"进市场，手持跟拍走进主通道，连续行走15秒。不说话，不字幕。\n\n拍摄角度：胸口高度，匀速前进，体现市场纵深和体量。",audio:"【声音】市场环境音全开——人声、叫卖声、阿拉伯语、摩托车声。无台词，无字幕。",tip:"这段不能剪短，市场的嘈杂感是卡萨布兰卡最独特的听觉符号。"},
    {id:"mk2",scene:"摊位扫描 — 中间商结构",time:"aft",tName:"🌇 下午",launch:true,dev:"Nano",ori:"竖屏",visual:"镜头缓慢扫过几个不同品类摊位。不说具体是什么货。\n\n拍摄角度：Nano 从侧面低角度扫过摊位，让货物填满画面。",audio:"【口述·出镜】一件从义乌出来的货，到摩洛哥消费者手里，中间至少要过三道手。进口商、批发商、零售商——\n（停顿）我在的位置，是最前面那一层。",tip:"「我在的位置，是最前面那一层」让观众瞬间理解你在链条里的角色。"},
    {id:"mk3",scene:"和摊主打招呼·对方倒茶 — 文化核心",time:"aft",tName:"🌇 下午",launch:true,dev:"Nano",ori:"竖屏",visual:"走进一家店，与摊主打招呼，对方给你倒茶。拍倒茶、递茶、坐下的动作。\n\n拍摄角度：Nano 放在侧面固定机位侧拍，拍手、茶杯、动作。",audio:"【画外音】在摩洛哥，第一次见面谈生意，对方一定先给你倒茶。这不是客套，这是规则。\n\n【声音】茶杯碰撞声、店内阿拉伯语人声，全部保留。",tip:"如果摊主不愿被拍，只拍你手里的茶杯也可以。"},
    {id:"mk4",scene:"欧洲货与中国货同框 — 竞争格局",time:"aft",tName:"🌇 下午",launch:true,dev:"Pocket 3",ori:"竖屏",visual:"找欧洲品牌商品或摊位，和旁边的中国货放在同一镜头。\n\n拍摄角度：Pocket 3 拍摊位全景，两种货品都清晰可见。",audio:"【口述·出镜】这个市场里，中国货不是唯一的外来者。欧洲货也在，土耳其货也在。摩洛哥的消费者，比你想象的更挑剔。\n（停顿）这里不是蓝海，是一个真实的市场，有竞争，有规则，也有机会。",tip:"「这里不是蓝海」对B端受众冲击力极强。"},
    {id:"mk5",scene:"认识的中国货 — 「这件我知道从哪来」",time:"aft",tName:"🌇 下午",launch:false,dev:"Nano",ori:"竖屏",visual:"找到一件你认识的中国货，拍它放在摩洛哥摊位上的样子。\n\n拍摄角度：Nano 近景特写，货品和摊位背景都在画面内。",audio:"【口述·出镜】这个，我知道从哪来的。\n（不展开，让观众脑补。）",tip:"「中国制造在非洲的真实命运」系列最直观素材。"},
    {id:"mk6",scene:"价格标签或批发价 — 数字对比",time:"aft",tName:"🌇 下午",launch:false,dev:"手机",ori:"竖屏",visual:"市场里的批发价格标签，或讨价还价结束后说过程。\n\n拍摄角度：手机平拍价格牌，清晰可读。",audio:"【口述·出镜】这个东西在义乌的出厂价是XX，在这里的批发价是XX，到消费者手里是XX。",tip:"两个数字放在一起，是外贸内容里信息量最炸裂的素材。"},

  {id:"gongcha",icon:"🍵",name:"贡茶",sub:"每天下午 · 每日积累",shots:[
    {id:"gc1",scene:"固定机位 — 说一句话+10秒留白",time:"aft",tName:"🌇 下午",launch:true,dev:"Pocket 3",ori:"竖屏",visual:"你坐在贡茶，打开电脑或手机。固定机位，说完一句话后继续做事，镜头再停留10秒。\n\n拍摄角度：Pocket 3 放在对面，略低于眼睛高度仰拍。背景必须有店内摩洛哥风格装饰和其他客人。",audio:"【口述·出镜】每天下午都来这里，处理线上的东西。这家店的老板认识我6年了。\n\n【10秒无台词】\n\n【声音】店内人声、茶杯声、阿拉伯语背景音——全部保留。",tip:"那10秒无台词的留白是整个账号「陪伴感」的核心，剪辑时绝对不要剪掉。"},
    {id:"gc2",scene:"出镜说谈生意文化 — 第二条核心段落",time:"aft",tName:"🌇 下午",launch:true,dev:"Pocket 3",ori:"竖屏",visual:"你坐在贡茶，出镜，看镜头说话。\n\n拍摄角度：Pocket 3 固定桌上，略低于眼睛高度。",audio:"【口述·出镜】我刚来的时候，恨不得见一次面把合同谈完。但这里不行。第一次见面，聊你是谁，从哪来，喝茶。第二次聊货，聊量，喝茶。第三次才谈价格。\n\n我花了将近一年才明白——他们不是不想谈，他们在用这个时间判断你这个人值不值得做生意。",tip:"说话节奏放慢，每句话之间留半拍，这是全片信息密度最高的地方。"},
    {id:"gc3",scene:"喝茶放杯停顿 — 不说话看窗外",time:"aft",tName:"🌇 下午",launch:true,dev:"Nano",ori:"竖屏",visual:"你喝一口茶，放下茶杯，看向窗外。不说话停顿2秒，然后说最后两句。\n\n拍摄角度：Nano 近景，拍你喝茶放杯的动作特写，然后拉开到面部。",audio:"【2秒无台词，只有茶杯声和环境音】\n\n【口述·出镜】现在我每天下午都来这里坐一坐。有时候觉得，这里的做生意方式，比我习惯的那种，其实不差。\n\n说完镜头停2秒，切走。",tip:"2秒停顿不要剪掉，这是第二条最有重量的情绪时刻。"},
    {id:"gc4",scene:"薄荷茶特写 — 倒茶瞬间",time:"aft",tName:"🌇 下午",launch:false,dev:"Nano",ori:"竖屏",visual:"薄荷茶被端上来或倒入杯中的瞬间。\n\n拍摄角度：Nano 低角度近景，对准茶杯，背景虚焦。",audio:"【字幕】在卡萨布兰卡，下午喝什么。\n\n【声音】茶倒进杯子的声音。",tip:"小选题，传播容易，是账号「体温」的来源。"},
    {id:"gc5",scene:"贡茶老板 — 「今天遇到的人」",time:"aft",tName:"🌇 下午",launch:false,dev:"Nano",ori:"竖屏",visual:"贡茶老板在工作的样子，或常驻顾客的状态。10秒素材。\n\n拍摄角度：Nano 侧面拍，不打扰。",audio:"【字幕】这家店的老板认识我6年了。\n（「今天遇到的人」系列的素材。）",tip:"固定栏目「今天遇到的人」的最自然起点就在贡茶。"},
    {id:"gc6",scene:"窗外街景 — 不同天气时段",time:"any",tName:"📌 随时",launch:false,dev:"Pocket 3",ori:"横屏→裁竖",visual:"从贡茶的窗户或门口往外看的卡萨布兰卡街道。不同天气、不同时间段多拍几条。\n\n拍摄角度：Pocket 3 固定在窗口，前景有窗框或桌面。",audio:"【声音】街道环境音，无台词。\n（高质量b-roll，适合任何选题。）",tip:"每次来都拍一条，是全账号最高质量的b-roll素材来源。"},
    {id:"panda2",scene:"【熊猫挂件】场景一 — 咖啡店店员",time:"aft",tName:"🌇 下午",launch:false,dev:"Pocket 3",ori:"竖屏",visual:"贡茶柜台，Pocket 3 稳定跟拍。环境音：咖啡机声、背景人声全部保留。把挂件递给店员，不说话，等她的反应自然发生，不引导。\n\n拍摄角度：站在柜台侧面，拍递出挂件和对方反应的过程。",audio:"【画外音，简短】第一个，咖啡店的店员，认识两年了。\n【字幕（如对方问「这是什么动物？」）】她问我：这个熊，是真实存在的吗？\n【你回应·出镜】中国有，只有中国有。",tip:"如果她直接笑着收下而没有问，也很好。不要事先解释是什么，让反应100%真实。"},
    {id:"panda5",scene:"【熊猫挂件】结尾 — 贡茶固定机位收场",time:"aft",tName:"🌇 下午",launch:false,dev:"Pocket 3",ori:"竖屏",visual:"你坐在贡茶，桌上还剩几个挂件，窗外街景可见。Pocket 3 固定机位，你看向镜头外，不直视镜头。下午光线拍，窗外街景有质感。\n\n拍摄角度：Pocket 3 放在对面桌上，略低于眼睛高度。",audio:"【画外音，慢，有停顿感】在这里做生意6年，\n有时候一个小东西，\n比一张名片管用。\n【画面停留2秒，自然结束，不加任何引导。】",tip:"这是全视频情绪收尾，台词要慢，每句之间停顿半拍。说完不加任何引导直接结束。"},

// ── SHOTS RENDER ─────────────────────────────────────
let currentFilter='all';
let shotIdx=0;
const filterDef=[
  {key:'today',label:'⚡ 今日'},
  {key:'all',label:'全部'},
  {key:'launch',label:'⭐ 引爆三条'},
  {key:'early',label:'☀️ 早晨'},
  {key:'noon',label:'🌤 上午/中午'},
  {key:'aft',label:'🌇 下午'},
  {key:'eve',label:'🌆 傍晚/夜晚'},
  {key:'any',label:'📌 随时'},
];

function getTodayTimeKey(){
  const h=new Date().getHours();
  if(h<11)return'early';
  if(h<14)return'noon';
  if(h<18)return'aft';
  return'eve';
}

function renderTodayBanner(){
  const timeKey=getTodayTimeKey();
  const timeLabels={early:'早晨',noon:'上午/中午',aft:'下午',eve:'傍晚/夜晚'};
  const allShots=LOCATIONS.flatMap(l=>l.shots);
  const todayShots=allShots.filter(s=>s.time===timeKey||s.time==='any');
  const done=todayShots.filter(s=>load('s_'+s.id)===1).length;
  const remaining=todayShots.length-done;
  document.getElementById('todayBanner').innerHTML=`
    <div class="today-banner" onclick="setTodayFilter()">
      <div class="today-banner-left">
        <div class="today-banner-title">今日任务</div>
        <div class="today-banner-sub">当前时段：${timeLabels[timeKey]} · 点击查看</div>
      </div>
      <div class="today-banner-count">${remaining}<small>待拍</small></div>
    </div>
  `;
}

function setTodayFilter(){
  currentFilter='today';
  renderFilterBar();
  renderShots();
  document.getElementById('filterBar').scrollLeft=0;
}

function timeClass(t){
  const m={early:'t-early',noon:'t-noon',aft:'t-aft',eve:'t-eve',any:'t-any'};
  return m[t]||'t-any';
}

function renderFilterBar(){
  const bar=document.getElementById('filterBar');
  bar.innerHTML=filterDef.map(f=>`<button class="chip${f.key===currentFilter?' active':''}" data-f="${f.key}">${f.label}</button>`).join('');
  bar.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    currentFilter=c.dataset.f;
    renderFilterBar();
    renderShots();
  }));
}

function renderShots(){
  shotIdx=0;
  const content=document.getElementById('shotsContent');
  content.innerHTML='';
  const todayKey=getTodayTimeKey();
  LOCATIONS.forEach(loc=>{
    const filtered=loc.shots.filter(s=>{
      if(currentFilter==='all')return true;
      if(currentFilter==='launch')return s.launch;
      if(currentFilter==='today')return s.time===todayKey||s.time==='any';
      return s.time===currentFilter;
    });
    if(!filtered.length)return;

    const grp=document.createElement('div');
    grp.className='loc-group';

    const doneCnt=filtered.filter(s=>load('s_'+s.id)===1).length;

    grp.innerHTML=`
      <div class="loc-head" data-loc="${loc.id}">
        <div class="loc-icon2">${loc.icon}</div>
        <div class="loc-info">
          <div class="loc-name">${loc.name}</div>
          <div class="loc-sub">${loc.sub}</div>
        </div>
        <div class="loc-badge" id="lb_${loc.id}">${doneCnt}/${filtered.length}</div>
        <div class="loc-arr">▶</div>
      </div>
      <div class="shots-list" id="sl_${loc.id}"></div>
    `;

    const sl=grp.querySelector('.shots-list');
    const lh=grp.querySelector('.loc-head');
    lh.addEventListener('click',()=>{
      sl.classList.toggle('open');
      lh.classList.toggle('open');
    });

    filtered.forEach(s=>{
      shotIdx++;
      const isDone=load('s_'+s.id)===1;
      const card=document.createElement('div');
      card.className='shot-card'+(isDone?' done':'');
      card.dataset.id=s.id;
      card.innerHTML=`
        <div class="shot-head">
          <div class="cb">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
              <path d="M1.5 5.5L4.5 8.5L9.5 2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="shot-body">
            <div class="tags-row">
              <span class="stag ${timeClass(s.time)}">${s.tName}</span>
              ${s.launch?'<span class="stag t-launch">⭐ 引爆三条</span>':''}
              <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ink4);background:var(--bg);padding:2px 6px;border-radius:3px;">#${String(shotIdx).padStart(2,'0')}</span>
            </div>
            <div class="shot-scene">${s.scene}</div>
            <div class="dev-row">
              <span class="dtag d-dev">📷 ${s.dev}</span>
              <span class="dtag d-ori">${s.ori}</span>
            </div>
            <button class="expand-toggle" data-id="${s.id}"><span class="ea">▶</span> 展开详情</button>
          </div>
        </div>
        <div class="shot-detail" id="sd_${s.id}">
          <div class="det-sec">
            <div class="det-label">画面内容 & 拍摄角度</div>
            <div class="det-txt">${s.visual}</div>
          </div>
          <div class="det-sec">
            <div class="det-label">台词 / 字幕 / 声音</div>
            <div class="audio-box">${s.audio}</div>
            ${s.tip?`<div class="tip-box">💡 ${s.tip}</div>`:''}
          </div>
        </div>
      `;

      card.querySelector('.cb').addEventListener('click',e=>{
        e.stopPropagation();
        const done=!card.classList.contains('done');
        card.classList.toggle('done',done);
        store('s_'+s.id,done?1:0);
        updateProgress();
        updateLocBadge(loc.id,filtered);
      });

      card.querySelector('.expand-toggle').addEventListener('click',e=>{

function updateProgress(){

  const total=allShots.length;
  const done=allShots.filter(s=>load('s_'+s.id)===1).length;

}

// ── IMPORT MODULE ──────────────────────────────────────
let pendingImport = null;

function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('importFileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const raw = e.target.result.replace(/```json|```/g, '').trim();
      const data = JSON.parse(raw);
      pendingImport = data;
      showImportPreview(data);
    } catch(err) {
      document.getElementById('importPreview').innerHTML =
        `<div style="color:var(--red);font-size:12px;padding:8px 0;">❌ 文件格式有误，请上传有效的 JSON 文件</div>`;
      pendingImport = null;
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function showImportPreview(data) {
  const shots = data.shots || [];
  const assignable = shots.filter(s => s.locationId && s.time).length;
  document.getElementById('importPreview').innerHTML = `
    <div class="preview-card">
      <div class="preview-title">${data.title || '未命名脚本'}</div>
      <div class="preview-meta">${data.positioning || ''} ${data.duration ? '· ' + data.duration : ''}</div>
      <div class="preview-shots-count">
        共 ${shots.length} 个镜头，其中 <strong style="color:var(--g)">${assignable} 个</strong>已分配地点和时间，将自动添加到拍摄清单
      </div>
      <div class="preview-actions">
        <button class="btn-import-cancel" onclick="cancelImport()">取消</button>
        <button class="btn-import-confirm" onclick="confirmImport()">确认导入</button>
      </div>
    </div>
  `;
}

function cancelImport() {
  pendingImport = null;
  document.getElementById('importPreview').innerHTML = '';
  document.getElementById('importFileName').textContent = '点击上传 JSON 脚本文件';
}

function confirmImport() {
  if (!pendingImport) return;
  const data = pendingImport;

  // 1. Save to scripts library
  const scripts = load('saved_scripts', []);
  const newScript = {
    id: Date.now(),
    idea: data.title || '',
    date: new Date().toLocaleDateString('zh-CN'),
    data: data
  };
  scripts.unshift(newScript);
  store('saved_scripts', scripts);

  // 2. Auto-assign shots to LOCATIONS checklist
  const shots = data.shots || [];
  let added = 0;
  shots.forEach(sh => {
    if (!sh.locationId || !sh.time) return;
    const loc = LOCATIONS.find(l => l.id === sh.locationId);
    if (!loc) return;
    const shotId = 'imp_' + newScript.id + '_' + sh.no;
    // Avoid duplicates
    if (loc.shots.find(s => s.id === shotId)) return;
    loc.shots.push({
      id: shotId,
      scene: sh.scene || '',
      time: sh.time,
      tName: TIME_LABELS[sh.time] || sh.time,
      launch: false,
      dev: sh.device || '手机',
      ori: sh.orient || '竖屏',
      visual: sh.visual || '',
      audio: sh.audio || '',
      tip: sh.tip || ''
    });
    added++;
  });

  // 3. Re-render both pages
  renderScriptsList();
  renderFilterBar();
  renderShots();

  cancelImport();
  toast(`脚本已导入，${added} 个镜头已添加到拍摄清单 ✓`);
}

let calDate=new Date();
let selectedDate=null;
let selectedPlatforms=[];

function changeMonth(d){
  calDate.setMonth(calDate.getMonth()+d);
  renderCal();
}

function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('calMonth').textContent=`${y}年${m+1}月`;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  ['一','二','三','四','五','六','日'].forEach(d=>{
    const el=document.createElement('div');
    el.className='cal-dow';el.textContent=d;grid.appendChild(el);
  });
  const first=new Date(y,m,1).getDay();
  const adj=first===0?6:first-1;
  for(let i=0;i<adj;i++){const el=document.createElement('div');el.className='cal-day';grid.appendChild(el);}
  const days=new Date(y,m+1,0).getDate();
  const today=new Date();
  const posts=load('cal_posts',{});
  for(let d=1;d<=days;d++){
    const el=document.createElement('div');
    el.className='cal-day';
    el.textContent=d;
    const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate())el.classList.add('today');
    if(posts[key]&&posts[key].length)el.classList.add('has-post');
    if(selectedDate===key)el.classList.add('selected');
    const dot=document.createElement('div');dot.className='dot';
    if(posts[key]&&posts[key].length)el.appendChild(dot);
    el.addEventListener('click',()=>{selectedDate=key;renderCal();renderCalDetail(key);});
    grid.appendChild(el);
  }
}

function renderCalDetail(key){
  const posts=load('cal_posts',{})[key]||[];
  const d=new Date(key);
  document.getElementById('calDetailTitle').textContent=fmtDate(d);
  const el=document.getElementById('calPosts');
  if(!posts.length){el.innerHTML='<div class="empty-cal">这一天还没有发布计划<br><small>点击右上角「+ 添加」</small></div>';return;}
  el.innerHTML=`<div class="post-list">${posts.map(p=>`
    <div class="post-item">
      <div class="post-status st-${p.status}"></div>
      <div class="post-info">
        <div class="post-title">${p.title}</div>
        <div class="post-tags">
          ${p.platforms.includes('douyin')?'<span class="post-tag douyin">抖音</span>':''}
          ${p.platforms.includes('xhs')?'<span class="post-tag xiaohongshu">小红书</span>':''}
          <span class="post-tag">${{draft:'草稿',ready:'待发布',published:'已发布'}[p.status]}</span>
        </div>
        ${p.note?`<div style="font-size:11px;color:var(--ink3);margin-top:3px;">${p.note}</div>`:''}
      </div>
      <button class="post-del" onclick="delPost('${key}',${p.id})">×</button>
    </div>
  `).join('')}</div>`;
}

  document.getElementById('postTitle').value='';

function savePost(){
  const title=document.getElementById('postTitle').value.trim();
  if(!title){toast('请输入标题');return;}
  const posts=load('cal_posts',{});
  if(!posts[selectedDate])posts[selectedDate]=[];

    status:document.getElementById('postStatus').value,

    note:document.getElementById('postNote').value.trim()
  });

  toast('已删除');
